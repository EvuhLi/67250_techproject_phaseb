<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Tickets - MonoMuse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">
        <header class="header"></header>
        <nav class="nav_bar">
            <img id="logo" src="../static/image.png" alt="MonoMuse Museum Logo">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html">Buy Tickets</a>
            <a href="javascript:void(0);" class="hamburger" onclick="toggleNav()">&#9776;</a>
        </nav>
        <main class="main">
            <h1>Buy Tickets</h1>

            <h2>Ticket Prices</h2>
            <table>
                <tr>
                    <th>Ticket Type</th>
                    <th>Description</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>General</td>
                    <td>General Admission for ages 18 and over. Under 18 is free</td>
                    <td>$18</td>
                </tr>
                <tr>
                    <td>Student</td>
                    <td>Valid student ID required at entry</td>
                    <td>$18</td>
                </tr>
                <tr>
                    <td>Member</td>
                    <td>Valid member ID required at entry</td>
                    <td>$18</td>
                </tr>
            </table>

            <h2>Purchase Tickets</h2>
            <form id="ticketForm" class="ticket-form" onsubmit="return validateAndSubmit(event)">
                <div class="form-group">
                    <label for="visitDate">Visit Date <span class="required">*</span></label>
                    <input type="date" id="visitDate" name="visitDate">
                    <span class="error-msg" id="visitDateError"></span>
                </div>

                <div class="form-group">
                    <label for="ticketType">Ticket Type <span class="required">*</span></label>
                    <select id="ticketType" name="ticketType" onchange="calculatePrice()">
                        <option value="">-- Select a ticket type --</option>
                        <option value="general">General - $18</option>
                        <option value="student">Student - $18</option>
                        <option value="member">Member - $18</option>
                    </select>
                    <span class="error-msg" id="ticketTypeError"></span>
                </div>

                <div class="form-group">
                    <label for="quantity">Number of Tickets (1-10) <span class="required">*</span></label>
                    <input type="number" id="quantity" name="quantity" min="1" max="10" onchange="calculatePrice()" oninput="calculatePrice()">
                    <span class="error-msg" id="quantityError"></span>
                </div>

                <div class="form-group">
                    <label for="totalPrice">Total Price</label>
                    <input type="text" id="totalPrice" name="totalPrice" value="$0.00" readonly>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="zipcode">Zip Code (optional)</label>
                    <input type="text" id="zipcode" name="zipcode" maxlength="5" placeholder="e.g. 15213">
                    <span class="error-msg" id="zipcodeError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="mailingList" name="mailingList">
                    <label for="mailingList">Join our mailing list</label>
                </div>

                <button type="submit" class="cta">Place Order</button>
            </form>
        </main>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
